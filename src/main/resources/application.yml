spring:
  application:
    name: dossia
  config:
    import: optional:classpath:application-local.yml,optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:dossia}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

dossia:
  cors:
    allowed-origins: http://localhost:4200
  auth:
    jwt-secret: ${JWT_SECRET:dosya-local-dev-secret-change-in-production-min-32-chars}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    cookie-name: dossia_access_token
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
    cookie-same-site: Lax
    admin-emails: ${ADMIN_EMAILS:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    chat-model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
    embedding-model: ${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
    retrieval-limit: ${GEMINI_RETRIEVAL_LIMIT:5}
    enabled: ${GEMINI_ENABLED:true}
  # auto = Gemini if key works, else Ollama; set LLM_PROVIDER=ollama to force local
  llm:
    provider: ${LLM_PROVIDER:auto}
  ollama:
    enabled: ${OLLAMA_ENABLED:true}
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    chat-model: ${OLLAMA_CHAT_MODEL:qwen2.5:7b-instruct}
    embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
  chat:
    rate-limit:
      enabled: ${CHAT_RATE_LIMIT_ENABLED:true}
      guest-max-requests: ${CHAT_GUEST_MAX_REQUESTS:30}
      guest-window-seconds: ${CHAT_GUEST_WINDOW_SECONDS:3600}
